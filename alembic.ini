# Alembic configuration for the ClauseOps web platform (`app/` package).
#
# The database URL is intentionally NOT hard-coded here: `migrations/env.py`
# loads it from `app.config.get_settings().database_url` so migrations always
# run against the same environment-driven async PostgreSQL URL the app uses.

[alembic]
# Path to migration scripts, relative to this file.
script_location = migrations

# Template used to generate migration file names; prefixing with a UTC date
# keeps the version history readable.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Use os.pathsep-separated paths; ensures the project root is importable so
# `import app...` works when alembic is invoked from the project root.
prepend_sys_path = .

# Timezone for file_template timestamps.
timezone = UTC

# sqlalchemy.url is populated at runtime in env.py from app settings.
sqlalchemy.url =


[post_write_hooks]
# (none configured)


# Logging configuration.
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
